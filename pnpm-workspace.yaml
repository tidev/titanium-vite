packages:
  - apps/*
  - packages/*
  - tooling/*

allowBuilds:
  core-js-pure: true
  esbuild: true

catalog:
  "@types/node": ^22.10.2
  eslint: ^9.12.0
  prettier: ^3.3.3
  typescript: ^5.6.3
  vite: ^8.0.11
  vitest: ^3.0.9
  zod: ^3.23.8

overrides:
  alloy-compiler: link:../alloy-devkit/packages/alloy-compiler
  alloy-utils: link:../alloy-devkit/packages/alloy-utils

publicHoistPattern:
  - "@ianvs/prettier-plugin-sort-imports"
